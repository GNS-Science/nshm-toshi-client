[coverage:run]
# uncomment the following to omit files during running
#omit =
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main

[tox:tox]
isolated_build = true
envlist = audit, py310, py311, py312, format, lint, build-linux, build-macos, build-windows
requires = tox-uv

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312, format, lint, build

[testenv]
allowlist_externals = pytest
dependency_groups = dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
commands =
    pytest --cov=nshm_toshi_client --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:audit]
allowlist_externals =
    uv
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project --output-file audit.txt
    uv run pip-audit -r audit.txt --require-hashes
    uv run safety scan

[testenv:format]
allowlist_externals =
    ruff
dependency_groups = dev
commands =
    ruff format nshm_toshi_client tests

[testenv:lint]
allowlist_externals =
    ruff
    mypy
dependency_groups = dev
commands =
    ruff check nshm_toshi_client tests
    mypy nshm_toshi_client tests

[testenv:build-linux]
platform = linux
allowlist_externals =
    uv
    mkdocs
dependency_groups = dev,doc
commands =
    uv build
    mkdocs build -q

[testenv:build-macos]
platform = darwin
allowlist_externals =
    uv
    mkdocs
dependency_groups = dev,doc
commands =
    uv build
    mkdocs build -q

[testenv:build-windows]
platform = win32
allowlist_externals =
    mkdocs
dependency_groups = dev,doc
commands =
    mkdocs build -q	